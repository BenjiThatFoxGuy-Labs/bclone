name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  DEBIAN_FRONTEND: noninteractive
  CI_LINUX_BOOTSTRAP_PACKAGES: >-
    build-essential ca-certificates curl fuse3 git git-annex
    git-annex-remote-rclone jq kmod libfuse-dev nfs-common
    pkg-config rpm tar unzip xz-utils zip zstd

jobs:
  quicktest:
    name: quicktest
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap Linux runner
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "::error::Linux runner bootstrap expects apt-get; install CI_LINUX_BOOTSTRAP_PACKAGES in the runner image or update this workflow for the runner OS."
            exit 1
          fi

          read -r -a packages <<< "$CI_LINUX_BOOTSTRAP_PACKAGES"
          missing=()
          for package in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}' "$package" 2>/dev/null | grep -q "install ok installed"; then
              missing+=("$package")
            fi
          done

          if (( ${#missing[@]} )); then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends "${missing[@]}"
          else
            echo "Linux runner packages already installed."
          fi

          modprobe_bin="$(command -v modprobe || true)"
          if [ -z "$modprobe_bin" ]; then
            for candidate in /usr/sbin/modprobe /sbin/modprobe; do
              if [ -x "$candidate" ]; then
                modprobe_bin="$candidate"
                break
              fi
            done
          fi

          if [ -n "$modprobe_bin" ]; then
            sudo "$modprobe_bin" fuse || echo "::warning::Unable to load the fuse kernel module; continuing with the existing /dev/fuse state."
          else
            echo "::error::modprobe is unavailable after installing kmod."
            exit 1
          fi

          if [ -e /dev/fuse ]; then
            sudo chmod 666 /dev/fuse
          else
            echo "::warning::/dev/fuse is not available on this runner; mount-dependent tasks may fail."
          fi

          if [ -e /etc/fuse.conf ]; then
            sudo chown "root:$(id -gn)" /etc/fuse.conf
          else
            echo "::warning::/etc/fuse.conf was not created by fuse3."
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0-rc.1'
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-test-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-test-
            ${{ runner.os }}-go-

      - name: Run quicktest
        shell: bash
        run: RCLONE_CONFIG="/notfound" go test --ldflags "-s -X github.com/rclone/rclone/fs.Version=v1.73.2-beta" -skip "TestLogger" ./...
        env:
          GOTAGS: cmount,noselfupdate
          CGO_ENABLED: 0
