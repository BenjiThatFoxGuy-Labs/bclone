name: ci

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CI_LINUX_ONLY: "true"
  DEBIAN_FRONTEND: noninteractive
  CI_LINUX_BOOTSTRAP_PACKAGES: >-
    build-essential ca-certificates curl fuse3 git git-annex
    git-annex-remote-rclone jq kmod libfuse-dev nfs-common
    pkg-config rpm tar unzip xz-utils zip zstd

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decides what kind of run this is and what to build. Like bdrive: tags get
  # the full matrix, everything else builds linux only and always runs (never
  # skipped), so required checks never block on a skipped state.
  #
  #   pr       PR event              -> linux only, docker pr-N, comment binaries
  #   release  push to a tag         -> full matrix, github release + docker latest
  #   nightly  push to main          -> full matrix, nightly release + docker nightly
  #   snapshot push to other branch  -> linux only, docker branch-name
  #   CI_LINUX_ONLY=true             -> selected mode, but without macOS/Windows
  setup:
    name: Determine run mode
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.config.outputs.mode }}
      linux_matrix: ${{ steps.config.outputs.linux_matrix }}
      extra_matrix: ${{ steps.config.outputs.extra_matrix }}
    steps:
      - &bootstrap_linux_runner
        name: Bootstrap Linux runner
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          # Find apt-get
          if command -v apt-get >/dev/null 2>&1; then
            HAVE_APT=true
          else
            # Try to locate apt-get in common paths
            if [ -x /usr/bin/apt-get ]; then
              apt-get="/usr/bin/apt-get"
              HAVE_APT=true
            elif [ -x /bin/apt-get ]; then
              apt-get="/bin/apt-get"
              HAVE_APT=true
            else
              echo "::warning::apt-get not found; assuming required packages are already installed."
              HAVE_APT=false
            fi
          fi

          if [ "$HAVE_APT" = true ]; then
            read -r -a packages <<< "$CI_LINUX_BOOTSTRAP_PACKAGES"
            missing=()
            for package in "${packages[@]}"; do
              if ! dpkg-query -W -f='${Status}' "$package" 2>/dev/null | grep -q "install ok installed"; then
                missing+=("$package")
              fi
            done

            if (( ${#missing[@]} )); then
              echo "Updating package list..."
              sudo "$apt-get" update
              echo "Installing missing packages: ${missing[*]}"
              sudo "$apt-get" install -y --no-install-recommends "${missing[@]}"
            else
              echo "Linux runner packages already installed."
            fi
          else
            # No apt-get, check if packages are present via dpkg (if dpkg exists) or assume they are.
            if command -v dpkg >/dev/null 2>&1; then
              echo "apt-get not found but dpkg present; checking for required packages..."
              # We'll just skip detailed check for simplicity
              echo "Cannot verify packages without apt-get; assuming they are present."
            else
              echo "Neither apt-get nor dpkg found; assuming this is not a Debian-based system and packages are already present."
            fi
          fi

          # Handle modprobe
          modprobe_bin="$(command -v modprobe || true)"
          if [ -z "$modprobe_bin" ]; then
            for candidate in /usr/sbin/modprobe /sbin/modprobe /usr/bin/modprobe; do
              if [ -x "$candidate" ]; then
                modprobe_bin="$candidate"
                break
              fi
            done
          fi

          if [ -n "$modprobe_bin" ]; then
            echo "Loading fuse module..."
            sudo "$modprobe_bin" fuse || echo "::warning::Unable to load the fuse kernel module; continuing with existing /dev/fuse state."
          else
            echo "::warning::modprobe not found; skipping fuse module load."
          fi

          if [ -e /dev/fuse ]; then
            sudo chmod 666 /dev/fuse
          else
            echo "::warning::/dev/fuse is not available on this runner; mount-dependent tasks may fail."
          fi

          if [ -e /etc/fuse.conf ]; then
            sudo chown "root:$(id -gn)" /etc/fuse.conf
          else
            echo "::warning::/etc/fuse.conf was not created by fuse3."
          fi
      - name: Determine mode and matrix
        id: config
        run: |
          LINUX_ONLY='[{"job_name":"linux","os":"ubuntu-latest","go":">=1.24.0-rc.1","gotags":"cmount,noselfupdate","cgo":"0","build_flags":"-include \"^(linux/amd64|linux/arm64)\""}]'
          LINUX_FULL='[{"job_name":"linux","os":"ubuntu-latest","go":">=1.24.0-rc.1","gotags":"cmount,noselfupdate","cgo":"0","build_flags":"-include \"^(linux/amd64|linux/arm64|linux/arm-v7)\""}]'
          EXTRA_FULL='[{"job_name":"windows","os":"windows-latest","go":">=1.24.0-rc.1","gotags":"cmount,noselfupdate","cgo":"0","build_flags":"-include \"^(windows/amd64|windows/arm64)\"","build_args":"-buildmode exe"},{"job_name":"mac_amd64","os":"macos-latest","go":">=1.23.0-rc.1","gotags":"cmount,noselfupdate","build_flags":"-include \"^darwin/amd64\" -cgo"},{"job_name":"mac_arm64","os":"macos-latest","go":">=1.23.0-rc.1","gotags":"cmount,noselfupdate","build_flags":"-include \"^darwin/arm64\" -cgo -macos-arch arm64 -cgo-cflags=-I/usr/local/include -cgo-ldflags=-L/usr/local/lib"}]'

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            MODE="pr"
            LINUX_MATRIX="$LINUX_ONLY"
            EXTRA_MATRIX="[]"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            MODE="release"
            LINUX_MATRIX="$LINUX_FULL"
            EXTRA_MATRIX="$EXTRA_FULL"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            MODE="nightly"
            LINUX_MATRIX="$LINUX_FULL"
            EXTRA_MATRIX="$EXTRA_FULL"
          else
            MODE="snapshot"
            LINUX_MATRIX="$LINUX_ONLY"
            EXTRA_MATRIX="[]"
          fi

          if [ "$CI_LINUX_ONLY" = "true" ]; then
            EXTRA_MATRIX="[]"
            echo "CI_LINUX_ONLY enabled"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "linux_matrix=$LINUX_MATRIX" >> "$GITHUB_OUTPUT"
          echo "extra_matrix=$EXTRA_MATRIX" >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

  build-linux:
    name: ${{ matrix.job_name }}
    timeout-minutes: 60
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.linux_matrix) }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - *bootstrap_linux_runner

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.job_name }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.job_name }}-
            ${{ runner.os }}-go-

      - name: Set environment variables
        shell: bash
        run: |
          echo 'GOTAGS=${{ matrix.gotags }}' >> $GITHUB_ENV
          echo 'BUILD_FLAGS=${{ matrix.build_flags }}' >> $GITHUB_ENV
          echo 'BUILD_ARGS=${{ matrix.build_args }}' >> $GITHUB_ENV
          if [[ "${{ matrix.cgo }}" != "" ]]; then echo 'CGO_ENABLED=${{ matrix.cgo }}' >> $GITHUB_ENV ; fi

      - name: Install Libraries on macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          unset HOMEBREW_NO_INSTALL_FROM_API
          brew untap --force homebrew/core
          brew untap --force homebrew/cask
          brew update
          brew install --cask macfuse
          brew install git-annex git-annex-remote-rclone

      - name: Install Libraries on Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          choco install -y winfsp
          choco install zip --source="bin"
          echo "CPATH=C:\Program Files\WinFsp\inc\fuse;C:\Program Files (x86)\WinFsp\inc\fuse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:GOARCH -eq "386") {
            choco install -y mingw --forcex86 --force
            echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\mingw32\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $path = (get-command mingw32-make.exe).Path
          Copy-Item -Path $path -Destination (Join-Path (Split-Path -Path $path) 'make.exe')

      - name: Print Go version and environment
        shell: bash
        run: |
          printf "Using go at: $(which go)\n"
          printf "Go version: $(go version)\n"
          printf "\n\nGo environment:\n\n"
          go env
          printf "\n\nRclone environment:\n\n"
          make vars

      - name: Build bclone
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then make release_dep_linux ; fi
          make cross

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: bclone-${{ matrix.job_name }}
          path: ${{ github.workspace }}/build/**/*
          retention-days: 3

  build-extra:
    name: ${{ matrix.job_name }}
    if: needs.setup.outputs.extra_matrix != '[]'
    timeout-minutes: 60
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.extra_matrix) }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - *bootstrap_linux_runner

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.job_name }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.job_name }}-
            ${{ runner.os }}-go-

      - name: Set environment variables
        shell: bash
        run: |
          echo 'GOTAGS=${{ matrix.gotags }}' >> $GITHUB_ENV
          echo 'BUILD_FLAGS=${{ matrix.build_flags }}' >> $GITHUB_ENV
          echo 'BUILD_ARGS=${{ matrix.build_args }}' >> $GITHUB_ENV
          if [[ "${{ matrix.cgo }}" != "" ]]; then echo 'CGO_ENABLED=${{ matrix.cgo }}' >> $GITHUB_ENV ; fi

      - name: Install Libraries on macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          unset HOMEBREW_NO_INSTALL_FROM_API
          brew untap --force homebrew/core
          brew untap --force homebrew/cask
          brew update
          brew install --cask macfuse
          brew install git-annex git-annex-remote-rclone

      - name: Install Libraries on Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          choco install -y winfsp
          choco install zip --source="bin"
          echo "CPATH=C:\Program Files\WinFsp\inc\fuse;C:\Program Files (x86)\WinFsp\inc\fuse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ($env:GOARCH -eq "386") {
            choco install -y mingw --forcex86 --force
            echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\mingw32\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $path = (get-command mingw32-make.exe).Path
          Copy-Item -Path $path -Destination (Join-Path (Split-Path -Path $path) 'make.exe')

      - name: Print Go version and environment
        shell: bash
        run: |
          printf "Using go at: $(which go)\n"
          printf "Go version: $(go version)\n"
          printf "\n\nGo environment:\n\n"
          go env
          printf "\n\nRclone environment:\n\n"
          make vars

      - name: Build bclone
        shell: bash
        run: |
          make cross

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: bclone-${{ matrix.job_name }}
          path: ${{ github.workspace }}/build/**/*
          retention-days: 3

  release:
    name: Create Release
    if: always() && (needs.setup.outputs.mode == 'nightly' || needs.setup.outputs.mode == 'release') && needs.build-linux.result == 'success' && (needs.build-extra.result == 'success' || needs.build-extra.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [setup, build-linux, build-extra]
    permissions:
      contents: write
    steps:
      - *bootstrap_linux_runner

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0-rc.1'
          check-latest: true

      - name: Get build tag
        id: get_tag
        run: echo "tag=$(make -s version)" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/build
          pattern: bclone-*
          merge-multiple: true

      - name: Copy Artifacts
        run: |
          mkdir build
          cp -r /tmp/build/* build/

      - name: Force-update nightly tag
        if: needs.setup.outputs.mode == 'nightly'
        run: |
          git tag -f nightly ${{ github.sha }}
          git push origin -f refs/tags/nightly

      - name: Create Nightly Release
        if: needs.setup.outputs.mode == 'nightly'
        uses: softprops/action-gh-release@v2
        with:
          name: Nightly (${{ steps.get_tag.outputs.tag }})
          tag_name: nightly
          prerelease: true
          body: |
            Nightly build from main branch.
            Version: ${{ steps.get_tag.outputs.tag }}
            Commit: ${{ github.sha }}
          files: build/**/*
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tagged Release
        if: needs.setup.outputs.mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/**/*
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

  comment-artifacts:
    name: Comment artifacts on PR
    if: needs.setup.outputs.mode == 'pr'
    runs-on: ubuntu-latest
    needs: [setup, build-linux]
    permissions:
      pull-requests: write
    steps:
      - *bootstrap_linux_runner

      - name: Comment PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📦 Linux binaries (amd64, arm64) built for this PR: [Download from Actions](${runUrl})`,
            });

  # Single Docker job, bdrive-style: always runs (never gated off, so never
  # skipped) and just computes a different tag per mode. One static check name
  # 'Docker image' that is green on every PR, so it works as a merge condition.
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [setup, build-linux]
    permissions:
      packages: write
    steps:
      - *bootstrap_linux_runner

      - name: Verify Docker is available
        shell: bash
        run: docker version

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0-rc.1'
          check-latest: true

      - name: Get build tag
        id: get_tag
        run: echo "tag=$(make -s version)" >> $GITHUB_OUTPUT

      - name: Determine Docker tags
        id: docker_config
        run: |
          GHCR_OWNER="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_ALT_OWNER="benjithatfoxguy"
          REPO="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${GHCR_OWNER}/${REPO}"
          ALT_IMAGE="${GHCR_ALT_OWNER}/${REPO}"

          ghcr_tag() {
            local owner="$1"
            local tag="$2"

            echo "ghcr.io/${owner}/${REPO}:${tag}"
          }

          case "${{ needs.setup.outputs.mode }}" in
            pr)
              PRIMARY_TAG="pr-${{ github.event.pull_request.number }}"
              ALIAS_TAG=""
              TAGS="$(ghcr_tag "${GHCR_OWNER}" "${PRIMARY_TAG}")"
              ALT_TAGS="$(ghcr_tag "${GHCR_ALT_OWNER}" "${PRIMARY_TAG}")"
              ;;
            nightly)
              PRIMARY_TAG="nightly"
              ALIAS_TAG=""
              TAGS="$(ghcr_tag "${GHCR_OWNER}" "${PRIMARY_TAG}")"
              ALT_TAGS="$(ghcr_tag "${GHCR_ALT_OWNER}" "${PRIMARY_TAG}")"
              ;;
            release)
              REF_TAG="${GITHUB_REF#refs/tags/}"
              PRIMARY_TAG="${REF_TAG}"
              ALIAS_TAG="latest"
              TAGS="$(ghcr_tag "${GHCR_OWNER}" "${PRIMARY_TAG}")"$'\n'"$(ghcr_tag "${GHCR_OWNER}" "${ALIAS_TAG}")"
              ALT_TAGS="$(ghcr_tag "${GHCR_ALT_OWNER}" "${PRIMARY_TAG}")"$'\n'"$(ghcr_tag "${GHCR_ALT_OWNER}" "${ALIAS_TAG}")"
              ;;
            snapshot)
              BRANCH="${GITHUB_REF#refs/heads/}"
              BRANCH="${BRANCH//\//-}"
              PRIMARY_TAG="${BRANCH}"
              ALIAS_TAG=""
              TAGS="$(ghcr_tag "${GHCR_OWNER}" "${PRIMARY_TAG}")"
              ALT_TAGS="$(ghcr_tag "${GHCR_ALT_OWNER}" "${PRIMARY_TAG}")"
              ;;
          esac

          if [ "${GHCR_ALT_OWNER}" = "${GHCR_OWNER}" ]; then
            ALT_TAGS=""
            PUBLISH_ALT_GHCR="false"
          else
            PUBLISH_ALT_GHCR="true"
          fi

          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "ghcr_owner=${GHCR_OWNER}" >> "$GITHUB_OUTPUT"
          echo "ghcr_alt_owner=${GHCR_ALT_OWNER}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "alt_image=${ALT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "alias_tag=${ALIAS_TAG}" >> "$GITHUB_OUTPUT"
          echo "publish_alt_ghcr=${PUBLISH_ALT_GHCR}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
            echo "alt_tags<<EOF"
            echo "$ALT_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/build
          pattern: bclone-linux
          merge-multiple: true

      - name: Extract binaries for Docker
        run: |
          for arch in amd64 arm64; do
            zip=$(ls /tmp/build/rclone-*-linux-${arch}.zip)
            unzip -o "$zip" -d "/tmp/extract-${arch}"
            mkdir -p "build/bclone-${arch}"
            cp /tmp/extract-${arch}/rclone-*-linux-${arch}/rclone "build/bclone-${arch}/rclone"
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check extra GHCR token
        if: steps.docker_config.outputs.publish_alt_ghcr == 'true'
        id: ghcr_alt_auth
        shell: bash
        env:
          GHCR_BENJITHATFOXGUY_TOKEN: ${{ secrets.GHCR_BENJITHATFOXGUY_TOKEN }}
        run: |
          if [ -n "${GHCR_BENJITHATFOXGUY_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GHCR_BENJITHATFOXGUY_TOKEN is not configured; skipping extra GHCR namespace publish."
          fi

      - name: Login to Docker Hub
        if: needs.setup.outputs.mode == 'nightly' || needs.setup.outputs.mode == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push Docker image to GHCR
        if: needs.setup.outputs.mode == 'pr' || needs.setup.outputs.mode == 'snapshot'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ steps.docker_config.outputs.image }}
            org.opencontainers.image.description=bclone image
          tags: ${{ steps.docker_config.outputs.tags }}

      - name: Build and push Docker image to registries
        if: needs.setup.outputs.mode == 'nightly'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ steps.docker_config.outputs.image }}
            org.opencontainers.image.description=bclone image
          tags: |
            ${{ steps.docker_config.outputs.tags }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ steps.docker_config.outputs.repo }}:${{ steps.docker_config.outputs.primary_tag }}

      - name: Build and push release Docker image to registries
        if: needs.setup.outputs.mode == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ steps.docker_config.outputs.image }}
            org.opencontainers.image.description=bclone image
          tags: |
            ${{ steps.docker_config.outputs.tags }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ steps.docker_config.outputs.repo }}:${{ steps.docker_config.outputs.primary_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ steps.docker_config.outputs.repo }}:${{ steps.docker_config.outputs.alias_tag }}

      - name: Login to extra GitHub Container Registry namespace
        if: steps.docker_config.outputs.publish_alt_ghcr == 'true' && steps.ghcr_alt_auth.outputs.available == 'true'
        id: extra_ghcr_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjithatfoxguy
          password: ${{ secrets.GHCR_BENJITHATFOXGUY_TOKEN }}

      - name: Build and push Docker image to extra GHCR namespace
        if: steps.docker_config.outputs.publish_alt_ghcr == 'true' && steps.ghcr_alt_auth.outputs.available == 'true' && steps.extra_ghcr_login.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.get_tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ steps.docker_config.outputs.alt_image }}
            org.opencontainers.image.description=bclone image
          tags: ${{ steps.docker_config.outputs.alt_tags }}

  docker-plugin:
    name: Docker plugin
    if: needs.setup.outputs.mode == 'nightly' || needs.setup.outputs.mode == 'release'
    runs-on: ubuntu-latest
    needs: [setup, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - *bootstrap_linux_runner

      - name: Verify Docker is available
        shell: bash
        run: docker version

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Publish Docker volume plugin
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          GHCR_BENJITHATFOXGUY_TOKEN: ${{ secrets.GHCR_BENJITHATFOXGUY_TOKEN }}
          MODE: ${{ needs.setup.outputs.mode }}
        run: |
          GHCR_OWNER="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          GHCR_ALT_OWNER="benjithatfoxguy"
          REPO="$(printf '%s' "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          PLUGIN_IMAGE_NAME="docker-volume-rclone"
          ARCHES="amd64 arm64"

          case "${MODE}" in
            nightly)
              BASE_TAG="nightly"
              TAG_SUFFIX="nightly"
              AMD64_ALIAS_TAGS="nightly"
              ;;
            release)
              REF_TAG="${GITHUB_REF#refs/tags/}"
              BASE_TAG="${REF_TAG}"
              TAG_SUFFIX="${REF_TAG#v}"
              AMD64_ALIAS_TAGS="${REF_TAG#v}"$'\n'"latest"
              ;;
          esac

          publish_plugin_set() {
            local plugin_user="$1"

            for PLUGIN_ARCH in ${ARCHES}; do
              make docker-plugin \
                PLUGIN_USER="${plugin_user}" \
                PLUGIN_IMAGE_NAME="${PLUGIN_IMAGE_NAME}" \
                PLUGIN_BASE_IMAGE_NAME="${REPO}" \
                PLUGIN_BASE_TAG="${BASE_TAG}" \
                PLUGIN_ARCH="${PLUGIN_ARCH}" \
                PLUGIN_TAG="${PLUGIN_ARCH}-${TAG_SUFFIX}"
            done

            while IFS= read -r PLUGIN_TAG; do
              [ -n "${PLUGIN_TAG}" ] || continue
              make docker-plugin \
                PLUGIN_USER="${plugin_user}" \
                PLUGIN_IMAGE_NAME="${PLUGIN_IMAGE_NAME}" \
                PLUGIN_BASE_IMAGE_NAME="${REPO}" \
                PLUGIN_BASE_TAG="${BASE_TAG}" \
                PLUGIN_ARCH="amd64" \
                PLUGIN_TAG="${PLUGIN_TAG}"
            done <<< "${AMD64_ALIAS_TAGS}"
          }

          publish_plugin_set "ghcr.io/${GHCR_OWNER}"
          if [ "${GHCR_ALT_OWNER}" != "${GHCR_OWNER}" ]; then
            if [ -n "${GHCR_BENJITHATFOXGUY_TOKEN}" ]; then
              if echo "${GHCR_BENJITHATFOXGUY_TOKEN}" | docker login ghcr.io -u "${GHCR_ALT_OWNER}" --password-stdin; then
                publish_plugin_set "ghcr.io/${GHCR_ALT_OWNER}" || echo "Could not publish plugin to ghcr.io/${GHCR_ALT_OWNER}; continuing."
              else
                echo "Could not log in to ghcr.io as ${GHCR_ALT_OWNER}; skipping extra GHCR plugin publish."
              fi
            else
              echo "GHCR_BENJITHATFOXGUY_TOKEN is not configured; skipping extra GHCR plugin publish."
            fi
          fi
          publish_plugin_set "${DOCKER_HUB_USERNAME}"
